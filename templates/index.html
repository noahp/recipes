{% extends "base.html" %}

{% block content %}
<div class="home">
  <p class="home-tagline">A personal collection of recipes.</p>
  <div class="category-grid">
    {% for cat in config.extra.categories %}
      {% set sec = get_section(path=cat ~ "/_index.md") %}
      <a class="category-card" href="{{ sec.permalink }}">
        <span class="cat-name">{{ sec.title }}</span>
        <span class="cat-count">{{ sec.pages | length }}</span>
      </a>
    {% endfor %}
  </div>
</div>
{% endblock %}

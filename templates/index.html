{% extends "base.html" %}

{% block content %}
<div class="home">
  <p class="home-tagline">A personal collection of recipes.</p>
  {% for cat in config.extra.categories %}
    {% set sec = get_section(path=cat ~ "/_index.md") %}
    <section class="home-category">
      <h2 class="home-cat-title"><a href="{{ sec.permalink }}">{{ sec.title }}</a></h2>
      <ul class="recipe-list">
        {% for page in sec.pages %}
          <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
        {% endfor %}
      </ul>
    </section>
  {% endfor %}
</div>
{% endblock %}
